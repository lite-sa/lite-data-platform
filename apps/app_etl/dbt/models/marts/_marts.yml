version: 2

models:
  - name: aml_alerts_008
    description: >
      AML-008 ("POS transactions outside business hours") run_date-keyed
      evaluation log (microbatch, lookback 0): one row per target
      (merchant) × run_date breach, suppression as a flag. One table per
      scenario, all column-identical to the spine (unioned by aml_alerts) —
      scenario-specific data lives only inside `evidence`. Append-only
      across days, partition-replace within a day; the exporter ships
      `run_date = today and not is_suppressed`. Never --full-refresh in
      prod — that rewrites the generation record.
    columns:
      - name: alert_id
        description: >
          md5(scenario_id | target_id | run_date) — deterministic
          dedup/case key, never reused, never mutated. target_level stays
          out of the hash (scenario_id determines it).
        tests: [not_null, unique]
      - name: scenario_id
        tests: [not_null]
      - name: scenario_name
        description: >
          Display name, hardcoded next to scenario_id in the model — frozen
          as-evaluated, so a later rename leaves mixed names across history
          for one scenario_id (accepted; same philosophy as `rule`).
        tests: [not_null]
      - name: target_level
        description: >
          What target_id identifies (free-form string, no pinned enum yet;
          'merchant' for AML-008). Constant within a scenario table.
        tests: [not_null]
      - name: target_id
        description: Subject of the alert (AML-008 — the merchant_id).
        tests: [not_null]
      - name: run_date
        tests: [not_null]
      - name: is_suppressed
        tests: [not_null]
      - name: suppression_period_start
        description: >
          With suppression_period_end, the anchoring alert's cooldown
          window as it applied to this row — [anchor run_date + 1, anchor
          run_date + cooldown] — frozen even if the cooldown var changes
          later. NULL on unsuppressed rows.
      - name: evidence
        description: >
          Spine column, scenario-owned content — the only place
          scenario-specific data lives (no flat copies; tuning reads
          aml_merchant_features or JSON functions over this). JSON with
          `rule` (one entry per clause: feature, value, operator, threshold
          — the rule as evaluated, frozen with the alert) and `context`
          (non-rule investigator pointers). Every breach carries one by
          construction.
        tests: [not_null]

  - name: aml_alerts_014
    description: >
      AML-014 ("Dormant account sudden high activity") run_date-keyed
      evaluation log — same spine and mechanics as aml_alerts_008 (see its
      description); breach = zero AUTHORIZE ops in the dormancy baseline
      [D−91, D−2] AND prev-day [D−1] burst (op count OR summed minor-unit
      amount over threshold). Evidence: the three rule clauses with
      observed values (the burst leg is an OR — which passed is readable
      from the values) + prev-day example payment.
    columns:
      - name: alert_id
        tests: [not_null, unique]
      - name: scenario_id
        tests: [not_null]
      - name: scenario_name
        tests: [not_null]
      - name: target_level
        tests: [not_null]
      - name: target_id
        tests: [not_null]
      - name: run_date
        tests: [not_null]
      - name: is_suppressed
        tests: [not_null]
      - name: evidence
        tests: [not_null]

  - name: aml_alerts_015
    description: >
      AML-015 ("Low-activity account sudden high activity" — placeholder
      name, confirm against the catalog) run_date-keyed evaluation log —
      same spine and mechanics as aml_alerts_008 (see its description);
      breach = 30d daily average (authorize_count_avg_30d) <= threshold
      AND prev-day [D−1] burst (op count OR summed minor-unit amount over
      threshold). Evidence: the three rule clauses with observed values
      (the burst leg is an OR — which passed is readable from the values)
      + prev-day example payment. Co-fires with AML-014 for dormant
      merchants by design (avg 0 satisfies both gates).
    columns:
      - name: alert_id
        tests: [not_null, unique]
      - name: scenario_id
        tests: [not_null]
      - name: scenario_name
        tests: [not_null]
      - name: target_level
        tests: [not_null]
      - name: target_id
        tests: [not_null]
      - name: run_date
        tests: [not_null]
      - name: is_suppressed
        tests: [not_null]
      - name: evidence
        tests: [not_null]

  - name: aml_alerts
    description: >
      Cross-scenario spine view over the per-scenario alert tables (union
      all) — same columns as the tables. Tests live on the underlying
      tables; testing the view would double-scan.
