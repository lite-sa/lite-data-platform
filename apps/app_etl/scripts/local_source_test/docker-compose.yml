# Disposable local Postgres standing in for the real read replica, which
# doesn't exist yet (see README.md). No named volume: `docker compose down`
# wipes all data, nothing to remember to clean up.
services:
  pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dlt_test
      POSTGRES_PASSWORD: dlt_test
      POSTGRES_DB: litecore_test
    ports:
      - "5432:5432"
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
